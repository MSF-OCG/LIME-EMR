  wf3-omrs-dhis2:
    name: wf3-omrs-dhis2
    jobs:
      Get-Mappings-from-Collection:
        name: Get Mappings from Collection
        adaptor: '@openfn/language-common@2.3.0'
        credential: null
        body: |
          const dhis2Map = {
            attr: {
              ageInMonth: "ihH5ur7jquC",
              firstName: "fa7uwpCKIwa",
              lastName: "Jt9BhFZkvP2",
              patientNumber: "P4wdYGkldeG", //DHIS2 ID -> "Patient Number"
              omrsPatientNumber: "ZBoxuExmxcZ", //MSF ID -> "OpenMRS Patient Number"
              omrsPatientUuid: "AYbfTPYMNJH", //"OpenMRS Patient UID"
              ageInYears: "T1iX2NuPyqS",
              birthdate: "WDp4nVor9Z7",
              placeOfliving: "rBtrjV1Mqkz", //Place of living
              nationality: "Xvzc9e0JJmp", //"Nationality"
              sex: "qptKDiv9uPl",
              currentStatus: "YUIQIA2ClN6",
              legalStatus: "Qq6xQ2s6LO8",
            },
            de: {},
          };
          
          const isValidUUID = (id) => {
            if (!id || typeof id !== "string") return false;
          
            const UUID_PATTERN =
              /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            return UUID_PATTERN.test(id);
          };
          
          collections.get("mosul-metadata-mappings-staging").then((state) => {
            state.optsMap = state.data
              .filter((i) => i.key.includes("optsMap-value-"))
              .map((i) => i.value);
          
            state.identifiers = state.data
              .filter((i) => i.key.includes("identifiers-value-"))
              .map((i) => i.value);
            state.syncedAt = state.data.find((i) => i.key === "syncedAt")?.value;
            state.formMetadata = state.data.find((i) => i.key === "formMetadata")?.value;
            state.placeOflivingMap = state.data.find(
              (i) => i.key === "placeOflivingMap"
            )?.value;
            state.sourceFile = state.data.filter(
              (i) => i.key === "sourceFile"
            )?.[0]?.value;
            state.fileDateModified = state.data.filter(
              (i) => i.key === "fileDateModified"
            )?.[0]?.value;
            state.formMaps = state.data.find((i) => i.key === "formMaps")?.value;
          
            // TODO: Remove state.optionSetKey, when needed
            // Build from state.formMaps
            state.optionSetKey = state.data.filter(
              (i) => i.key === "optionSetKey"
            )?.[0]?.value;
          
            delete state.data;
            delete state.references;
            return state;
          });
          
          fn((state) => {
            const { formMetadata, identifiers, ...rest } = state;
          
            rest.v2FormUuids = formMetadata
              .filter(
                (form) =>
                  isValidUUID(form["OMRS form.uuid"]) &&
                  form["OMRS Form Version"] === "v4-2025"
              )
              .map((form) => form["OMRS form.uuid"]);
            rest.formUuids = formMetadata
              .filter(
                (form) =>
                  isValidUUID(form["OMRS form.uuid"]) && form["Workflow"] === "WF3"
              )
              .map((form) => form["OMRS form.uuid"]);
          
            // rest.orgUnit = identifiers.find(i => i.type === 'ORG_UNIT')?.[
            //   'dhis2 attribute id'
            // ];
          
            rest.orgUnit = "sUpt0j2GmBD";
          
            rest.program = "dWdzxMuKa8Z";
          
            rest.patientProgramStage = state.formMaps.patient.programStage;
          
            rest.dhis2PatientNumber = identifiers.find(
              (i) => i.type === "DHIS2_PATIENT_NUMBER"
            )?.["omrs identifierType"]; //DHIS2 ID or DHIS2 Patient Number
          
            rest.openmrsAutoId = identifiers.find((i) => i.type === "OPENMRS_AUTO_ID")?.[
              "omrs identifierType"
            ]; //MSF ID or OpenMRS Patient Number
          
            rest.dhis2Map = dhis2Map;
            return rest;
          });
          
      Get-Encounters:
        name: Get Encounters
        adaptor: '@openfn/language-openmrs@4.3.0'
        credential: michael.bontyes@geneva.msf.org-openmrs
        body: |
          function removeLinks(data) {
            if (Array.isArray(data)) {
              return data.map(removeLinks);
            }
          
            if (typeof data === "object" && data !== null) {
              const { links, ...rest } = data;
              return Object.fromEntries(
                Object.entries(rest).map(([key, value]) => [key, removeLinks(value)])
              );
            }
          
            return data;
          }
          
          function removeNulls(data) {
            if (Array.isArray(data)) {
              return data.filter((item) => item !== null).map(removeNulls);
            }
          
            if (typeof data === "object" && data !== null) {
              const result = {};
              for (const [key, value] of Object.entries(data)) {
                if (value !== null) {
                  result[key] = removeNulls(value);
                }
              }
              return result;
            }
          
            return data;
          }
          const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          // Fetch patient encounters
          each(
            $.patientUuids,
            get("encounter", { patient: $.data, v: "full" }).then((state) => {
              const patientUuid = state.references.at(-1);
          
              const filteredEncounters = state?.data?.results
                .filter(
                  (e) =>
                    e.auditInfo.dateCreated >= state.cursor &&
                    state.formUuids.includes(e?.form?.uuid)
                )
                .sort(
                  (a, b) =>
                    new Date(b.auditInfo.dateCreated) - new Date(a.auditInfo.dateCreated)
                );
          
              // Why we only keep the latest one form encounter?
              // const encounters = filteredEncounters.map((e) => e[0]).filter((e) => e);
              state.encounters ??= [];
              state.encounters.push(...filteredEncounters);
          
              console.log(
                state.encounters?.length,
                `# of filtered encounters found in OMRS for ${patientUuid}`
              );
              delay(1500);
          
              return state;
            })
          );
          
          fn((state) => {
            const {
              data,
              index,
              response,
              references,
              allResponse,
              patientUuids,
              patients,
              encounters,
              ...next
            } = state;
          
            if (encounters?.length) {
              const encountersByVisit = encounters
                .map((encounter) => {
                  const { uuid, patient, obs, form, encounterDatetime, visit } =
                    removeLinks(removeNulls(encounter));
          
                  return {
                    visit: { uuid: visit.uuid },
                    uuid,
                    patient: {
                      uuid: patient.uuid,
                      display: patient.display,
                    },
                    obs: obs?.map((o) => {
                      return {
                        uuid: o.uuid,
                        concept: o.concept,
                        display: o.display,
                        formFieldPath: o.formFieldPath,
                        value: o.value,
                      };
                    }),
                    form: {
                      uuid: form?.uuid,
                      display: form?.display,
                      description: form?.description,
                      name: form?.name,
                    },
                    encounterDatetime,
                  };
                })
                .reduce((acc, curr) => {
                  const visitPerForm = `${curr.visit.uuid}-${curr.form.uuid}`;
                  if (!acc[visitPerForm]) {
                    acc[visitPerForm] = [curr];
                  } else {
                    acc[visitPerForm].push(curr);
                  }
          
                  return acc;
                }, {});
          
              next.latestEncountersByVisit = Object.values(encountersByVisit)
                .map((encounters) => encounters[0]) // Latest encounter per visit
                .flat();
          
              next.encountersPatientUuids = [
                ...new Set(
                  next.latestEncountersByVisit.map((encounter) => encounter.patient.uuid)
                ),
              ];
            } else {
              console.log("No encounters found for cursor: ", next.cursor);
            }
          
            return next;
          });
          
      Create-Events:
        name: Create Events
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          const buildTeiUrl = (baseUrl, { trackedEntity, program, orgUnit }) => {
            return `${baseUrl}/dhis-web-tracker-capture/index.html#/dashboard?tei=${trackedEntity}&program=${program}&ou=${orgUnit}`;
          };
          
          const buildEventsUrl = (baseUrl, { program, orgUnit }) => {
            return `${baseUrl}/dhis-web-capture/index.html#/?orgUnitId=${orgUnit}&programId=${program}`
          }
          // Create or update events for each encounter
          create(
            "tracker",
            {
              events: (state) => {
                const baseUrl = state.configuration.hostUrl;
          
                const groupedEvents = state.eventsMapping.reduce((acc, event) => {
                  const { trackedEntity, program, orgUnit } = event;
                  const key = `${trackedEntity}-${program}-${orgUnit}`;
                  if (!acc[key]) {
                    acc[key] = [];
                  }
                  acc[key].push(event);
                  return acc;
                }, {});
                Object.entries(groupedEvents).forEach(([key, events]) => {
                  const [trackedEntity, program, orgUnit] = key.split("-");
          
                  const teiUrl = buildTeiUrl(baseUrl, {
                    trackedEntity,
                    program,
                    orgUnit,
                  });
                  const eventsUrl = buildEventsUrl(baseUrl, { program, orgUnit })
          
                  console.log({ events, teiUrl, eventsUrl });
                });
                return state.eventsMapping;
              },
            },
            {
              params: {
                async: false,
                dataElementIdScheme: "UID",
                importStrategy: "CREATE_AND_UPDATE",
              },
            }
          );
          fn(({ lastRunDateTime }) => ({ lastRunDateTime }));
          
      Custom-Logic-for-Events:
        name: Custom Logic for Events
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body: |
          // F64-specific age attributes
          const f64AgeInYearsAttr = "Rv8WM2mTuS5"; //dhis2Map.attr.ageInYears
          const f64AgeInMonthsAttr = "k26cdlS78i9";
          
          const MILLISECONDS_PER_YEAR = 365.25 * 24 * 60 * 60 * 1000;
          const calculateAge = (dob) =>
            Math.floor((new Date() - new Date(dob)) / MILLISECONDS_PER_YEAR);
          
          const teiAge = (tei, attr) => {
            const { ageInYears, birthdate } = attr;
            let age = tei?.attributes?.find(
              (attr) => attr.attribute === ageInYears
            )?.value;
          
            if (!age) {
              const dob = tei?.attributes?.find(
                (attr) => attr.attribute === birthdate
              )?.value;
              age = calculateAge(dob);
            }
            return age;
          };
          
          const formIdByName = (name, formMaps) => {
            const entry = Object.entries(formMaps).find(([formId, form]) =>
              form.formName.includes(name)
            );
            return entry ? entry[0] : null;
          };
          
          const ageInDays = (dob, encounterDate) => {
            const birth = new Date(dob);
            const encounter = new Date(encounterDate);
            const diffTime = Math.abs(encounter - birth);
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
          };
          
          const conceptAndValue = (encounter, conceptUuid, valueUuid) => {
            const answer = encounter.obs.find(
              (o) => o.concept.uuid === conceptUuid && o.value.uuid === valueUuid
            );
            return answer ? "TRUE" : "FALSE";
          };
          const conceptAndValueTrueOnly = (encounter, conceptUuid, valueUuid) => {
            const answer = encounter.obs.find(
              (o) => o.concept.uuid === conceptUuid && o.value.uuid === valueUuid
            );
            return answer ? "TRUE" : undefined;
          };
          
          const dataValueByConcept = (encounter, de, state) => {
            const { dataElement, conceptUuid, questionId, type } = de;
          
            const answer = encounter.obs.find((o) => o.concept.uuid === conceptUuid);
            const isObjectAnswer = answer && typeof answer.value === "object";
            const isStringAnswer = answer && typeof answer.value === "string";
            const isNumberAnswer = answer && typeof answer.value === "number";
          
            if (isStringAnswer && type === "time") {
              return answer.value.substring(11, 16);
            }
            if (isStringAnswer || isNumberAnswer) {
              return answer.value;
            }
          
            if (isObjectAnswer) {
              if (type === "true_only" && answer.value.display.toLowerCase() === "yes") {
                return "true";
              }
              if (type === "boolean") {
                return toTrueOrFalse(answer.value.display);
              }
              const optionKey = questionId
                ? `${encounter.form.uuid}-${answer.concept.uuid}-${questionId}`
                : `${encounter.form.uuid}-${answer.concept.uuid}`;
          
              const matchingOptionSet = state.optionSetKey[optionKey];
          
              const opt = state.optsMap.find(
                (o) =>
                  o["value.uuid - External ID"] === answer.value.uuid &&
                  o["DHIS2 Option Set UID"] === matchingOptionSet
              );
          
              if (!opt && matchingOptionSet) {
                console.log(
                  `No opt found for External id ${answer.value.uuid} and DHIS2 OptionSet ${matchingOptionSet}`
                );
              }
          
              const matchingOption = opt?.["DHIS2 Option Code"];
          
              if (!matchingOption) {
                const optSet = {
                  timestamp: new Date().toISOString(),
                  openMrsQuestion: answer.concept.display || "N/A",
                  conceptExternalId: answer.concept.uuid,
                  answerDisplay: answer.value.display,
                  answerValueUuid: answer.value.uuid,
                  dhis2DataElementUid: dataElement,
                  dhis2OptionSetUid: matchingOptionSet || "N/A",
                  metadataFormName: encounter.form.name || encounter.form.uuid,
                  encounterUuid: encounter.uuid,
                  patientUuid: encounter.patient.uuid,
                  sourceFile: state.sourceFile,
                  optionKey,
                };
                // Capture missing DHIS2 Option Codes for tracking
                state.missingOptsets.push(optSet);
              }
          
              if (["FALSE", "No"].includes(matchingOption)) return "false";
              if (["TRUE", "Yes"].includes(matchingOption)) return "true";
          
              return matchingOption;
            }
          };
          
          const findObsByConcept = (encounter, conceptUuid, questionId) => {
            const answer = encounter.obs.find(
              (o) =>
                o.concept.uuid === conceptUuid &&
                (questionId ? o.formFieldPath === questionId : true)
            );
          
            return answer;
          };
          
          const filterObsByConcept = (encounter, conceptUuid, questionId) => {
            const answers = encounter.obs.filter(
              (o) =>
                o.concept.uuid === conceptUuid &&
                (questionId ? o.formFieldPath === questionId : true)
            );
            return answers;
          };
          
          const toTrueOrFalse = (value) => {
            if (["true", "yes"].includes(value.toLowerCase())) {
              return "true";
            }
            if (["false", "no"].includes(value.toLowerCase())) {
              return "false";
            }
            return value;
          };
          const findDataValue = (encounter, dataElement, state) => {
            if (dataElement === "H9noxo3e7ox") {
              return;
            }
            const form = state.formMaps[encounter.form.uuid];
            const [conceptUuid, type, questionId] =
              form.dataValueMap[dataElement]?.split("::");
            const answer = encounter.obs.find(
              (o) =>
                o.concept.uuid === conceptUuid &&
                (o.formFieldPath === questionId || !questionId)
            );
            const isObjectAnswer = answer && typeof answer.value === "object";
            const isStringAnswer = answer && typeof answer.value === "string";
            const isNumberAnswer = answer && typeof answer.value === "number";
          
            if (isStringAnswer && type === "time") {
              return answer.value.substring(11, 16);
            }
            if (isStringAnswer || isNumberAnswer) {
              return answer.value;
            }
          
            if (isObjectAnswer) {
              if (type === "true_only" && answer.value.display.toLowerCase() === "yes") {
                return "true";
              }
              if (type === "boolean") {
                return toTrueOrFalse(answer.value.display);
              }
              const optionKey = questionId
                ? `${encounter.form.uuid}-${answer.concept.uuid}-${questionId}`
                : `${encounter.form.uuid}-${answer.concept.uuid}`;
          
              const matchingOptionSet = state.optionSetKey[optionKey];
          
              const opt = state.optsMap.find(
                (o) =>
                  o["value.uuid - External ID"] === answer.value.uuid &&
                  o["DHIS2 Option Set UID"] === matchingOptionSet
              );
          
              // Removed fallback logic to DHIS2 Option name and answer.value.display
              // Now only using DHIS2 Option Code to ensure proper validation
              const matchingOption = opt?.["DHIS2 Option Code"];
          
              // Capture missing DHIS2 Option Codes for tracking
              if (!matchingOption) {
                state.missingOptsets.push({
                  timestamp: new Date().toISOString(),
                  openMrsQuestion: answer.concept.display || "N/A",
                  conceptExternalId: answer.concept.uuid,
                  answerDisplay: answer.value.display,
                  answerValueUuid: answer.value.uuid,
                  dhis2DataElementUid: dataElement,
                  dhis2OptionSetUid: matchingOptionSet || "N/A",
                  metadataFormName: encounter.form.name || encounter.form.uuid,
                  encounterUuid: encounter.uuid,
                  patientUuid: encounter.patient.uuid,
                  sourceFile: state.sourceFile,
                  optionKey,
                });
              }
          
              if (["FALSE", "No"].includes(matchingOption)) return "false";
              if (["TRUE", "Yes"].includes(matchingOption)) return "true";
          
              return matchingOption;
            }
          
            const isEncounterDate =
              conceptUuid === "encounter-date" &&
              ["CXS4qAJH2qD", "I7phgLmRWQq", "yUT7HyjWurN", "EOFi7nk2vNM"].includes(
                dataElement
              );
          
            // These are data elements for encounter date in DHIS2
            // F29 MHPSS Baseline v2, F31-mhGAP Baseline v2, F30-MHPSS Follow-up v2, F32-mhGAp Follow-up v2
            if (isEncounterDate) {
              return encounter.encounterDatetime.replace("+0000", "");
            }
          
            return "";
          };
          
          const multiSelectAns = (encounter, multiSelectQns) => {
            const dataValues = multiSelectQns
              .map((q) =>
                q.qns
                  .map((qn) => {
                    const dataElement = qn.clde;
                    const ans = encounter.obs.find(
                      (obs) =>
                        obs.value.uuid === qn.multiAns &&
                        obs.formFieldPath === q.qid &&
                        obs.concept.uuid === q.extId
                    );
                    let value = undefined;
                    if (qn.type === "TRUE_ONLY") {
                      value = ans ? "true" : undefined;
                    }
                    if (qn.type === "BOOLEAN") {
                      value = ans ? "true" : "false";
                    }
                    return { dataElement, value };
                  })
                  .filter(Boolean)
              )
              .flat()
              .filter(Boolean);
          
            return dataValues;
          };
          function f8(encounter) {
            const timePart = encounter.encounterDatetime.substring(11, 16);
            return {
              dataValues: [{ dataElement: "iQio7NYSA3m", value: timePart }],
              eventDate: encounter.encounterDatetime.replace("+0000", ""),
            };
          }
          
          function f26(encounter, state) {
            const config = {
              concept: "8afa4dfc-b2af-452c-b402-4b96b0f334b4",
              qid: "rfe-forms-antimalariaType",
              dataElements: ["GUiSgvbwUyc", "F6C5WnGoj5r"],
            };
            const antimalariaType = filterObsByConcept(
              encounter,
              config.concept,
              config.qid
            );
          
            return antimalariaType.slice(0, 2).map((obs, index) => {
              const de = config.dataElements[index];
          
              const value = dataValueByConcept(
                { ...encounter, obs: [obs] }, // Pass single obs
                {
                  dataElement: de,
                  conceptUuid: config.concept,
                  questionId: config.qid,
                },
                state
              );
              return {
                dataElement: de,
                value: value,
              };
            });
          }
          
          function f27(encounter) {
            const admissionDate = findObsByConcept(
              encounter,
              "7f00c65d-de60-467a-8964-fe80c7a85ef0"
            )?.value;
            if (!admissionDate) return { dataValues: [], eventDate: null };
            const timePart = admissionDate.substring(11, 16);
            const datePart = admissionDate.replace("+0000", "");
            return {
              dataValues: [{ dataElement: "eYvDzr2m8f5", value: timePart }],
              eventDate: datePart,
            };
          }
          
          function f41(encounter) {
            const obsDatetime = findObsByConcept(
              encounter,
              "40108bf5-0bbd-42e8-8102-bcbd0550a943"
            )?.value;
            if (!obsDatetime) return { dataValues: [], eventDate: null };
          
            const timePart = obsDatetime.substring(11, 16);
            const datePart = obsDatetime.replace("+0000", "");
          
            return {
              dataValues: [
                { dataElement: "gluXfK7zg1d", value: timePart },
                { dataElement: "bkissws06TK", value: timePart },
              ],
              eventDate: datePart,
            };
          }
          
          function f42(encounter) {
            const obsDatetime = findObsByConcept(
              encounter,
              "7f00c65d-de60-467a-8964-fe80c7a85ef0"
            )?.value;
            if (!obsDatetime) return { dataValues: [], eventDate: null };
          
            return {
              dataValues: [{ dataElement: "xr2Dqw14DGX", value: obsDatetime }],
              eventDate: obsDatetime.replace("+0000", ""),
            };
          }
          
          function f43(encounter, tei, dhis2Attr) {
            const mappings = [];
            let eventDate = null;
          
            // Date/Time mapping (Question #1)
            // Concept: 88472a4e-f26e-4235-8144-4ad6df874949
            const obsDatetime = findObsByConcept(
              encounter,
              "88472a4e-f26e-4235-8144-4ad6df874949"
            )?.value;
          
            if (obsDatetime) {
              const datePart = obsDatetime.substring(0, 10);
              const timePart = obsDatetime.substring(11, 16);
              eventDate = datePart;
              mappings.push(
                {
                  dataElement: "tR7XL9TPVkr", // Emergency Room - Discharge date
                  value: datePart,
                },
                {
                  dataElement: "P8bmDESxYqn", // Emergency Room - Time of discharge (HH:MM)
                  value: timePart,
                }
              );
            }
          
            // Age calculations with fallback logic
            const birthdate = tei?.attributes?.find(
              (attr) => attr.attribute === dhis2Attr.birthdate
            )?.value;
          
            // Age in years (BA7aQjiwlrL) - from attribute or calculated from DOB
            let ageInYears = tei?.attributes?.find(
              (attr) => attr.attribute === dhis2Attr.ageInYears
            )?.value;
          
            if (!ageInYears && birthdate) {
              ageInYears = calculateAge(birthdate);
            }
          
            if (ageInYears) {
              mappings.push({
                dataElement: "BA7aQjiwlrL", // Emergency Room - Age in years
                value: ageInYears,
              });
            }
          
            // Age in months (hT8pIot8b6Y) - from attribute or calculated from DOB
            let ageInMonths = tei?.attributes?.find(
              (attr) => attr.attribute === dhis2Attr.ageInMonth
            )?.value;
          
            if (!ageInMonths && birthdate) {
              const birth = new Date(birthdate);
              const now = new Date();
              const diffTime = Math.abs(now - birth);
              const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
              ageInMonths = Math.floor(diffDays / 30.44); // approximate months
            }
          
