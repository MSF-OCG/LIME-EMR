            F63_CONFIG.exitStage.simpleValues.forEach((mapping) => {
              const value = findAnswerByConcept(encounter, mapping.concept, mapping.qid);
              if (value) {
                exitDataValues.push({
                  dataElement: mapping.de,
                  value,
                });
              }
            });
          
            const exitEvent = {
              event: events?.find(
                (e) => e.programStage === F63_CONFIG.exitStage.programStage
              )?.event,
              programStage: F63_CONFIG.exitStage.programStage,
              dataValues: exitDataValues,
            };
          
            return [defaultEvent, hospitalisationEvent, exitEvent];
          }
          
          const EXIT_EVENT_STAGE_IDS = [
            "sBepdVG2c9O", // Social Work exit stage (F59, F60)
            "Otoff7Cj8JQ", // Palliative Care exit stage (F62, F63)
            "ecvF615g1jZ", // NCD exit stage (F50)
            "tGfMHhweXBX", // HIV exit stage (F52)
            "lhoIy2xFovz", // TB DSTB exit stage (F54)
            "fcgrvRF4OqI", // TB DRTB exit stage (F54)
            "d5sMByjqQFm", // HBV exit stage (F56)
            "Rd73a6zlYEy", // HCV exit stage (F58)
          ];
          
          fn((state) => {
            // Initialize array to track missing DHIS2 Option Codes
            state.missingOptsets ??= [];
          
            const handleMissingRecord = (data, state) => {
              const { uuid, display } = data.patient;
          
              console.log(uuid, "Patient is missing trackedEntity or enrollment");
          
              state.missingRecords ??= {};
              state.missingRecords[uuid] ??= {
                encounters: [],
                patient: display,
              };
          
              state.missingRecords[uuid].encounters.push(data.uuid);
            };
            console.log("Total encounters:", state.encounters.length);
          
            state.eventsMapping = state.encounters
              .map((encounter, index) => {
                console.log(`Processing encounter ${index}:`, encounter.form.uuid);
          
                const form = state.formMaps[encounter.form.uuid];
                if (!form?.dataValueMap) {
                  return null;
                }
                const program = state.formMaps[encounter.form.uuid].programId;
                const orgUnit = state.formMaps[encounter.form.uuid].orgUnit;
                const patientOuProgram = `${orgUnit}-${program}-${encounter.patient.uuid}`;
                const { trackedEntity, enrollments } =
                  state.existingTeis[patientOuProgram] || {};
                const enrollment = enrollments?.[0]?.enrollment;
                const events = enrollments?.[0]?.events;
          
                if (!trackedEntity || !enrollment) {
                  console.log(
                    `❌ Missing TEI data for patient ${encounter.patient.uuid}`
                  );
          
                  handleMissingRecord(encounter, state);
                  return null;
                }
                console.log(`✅ Processing encounter ${index} successfully`);
          
                const formDataElements = Object.keys(form.dataValueMap);
                let formDataValues = formDataElements
                  .map((dataElement) => {
                    const value = findDataValue(encounter, dataElement, state);
                    if (value !== null && value !== undefined && value !== "") {
                      return { dataElement, value };
                    }
                  })
                  .filter((dv) => {
                    return (
                      dv?.value &&
                      !["pj5hIE6iyAR", "KjgDauY9v4J", "DYTLOoEKRas"].includes(
                        dv?.dataElement
                      )
                    );
                  });
          
                const multiSelectDvs = multiSelectAns(encounter, form.multiSelectQns);
                const customMapping = [
                  mapF13(encounter, state),
                  mapF18(encounter, state.encounters),
                  mapF16(encounter),
                  mapF17(encounter),
                  mapF29(encounter),
                  mapF22(encounter),
                  mapF37(encounter),
                  mapF38(encounter),
                  mapF30F29(encounter, state.allEncounters),
                  mapF32F31(encounter, state.allEncounters),
                  mapF33F34(encounter, state.allEncounters),
                  mapF40(encounter),
                ]
                  .filter(Boolean) // Only include non-empty mappings
                  .flat(); // flattening the array
          
                const latestFormEvent = events.find(
                  (e) => e.programStage === form.programStage
                )?.event;
          
                const encounterEvent = events.find(
                  (e) =>
                    e.programStage === form.programStage &&
                    e.occurredAt === encounter.encounterDatetime.replace("+0000", "")
                )?.event;
          
                const event =
                  form.syncType === "latest" ? latestFormEvent : encounterEvent;
                const formEvent = {
                  event,
                  program,
                  orgUnit,
                  trackedEntity,
                  enrollment,
                  occurredAt: encounter.encounterDatetime.replace("+0000", ""),
                  programStage: form.programStage,
                  dataValues: [
                    ...formDataValues,
                    ...customMapping,
                    ...multiSelectDvs,
                  ].filter((d) => d?.value),
                };
          
                const exitFormEvents = buildExitEvent(
                  encounter,
                  {
                    program,
                    orgUnit,
                    trackedEntity,
                    enrollment,
                    events,
                  },
                  state
                );
          
                const mappings = [
                  formEvent,
                  ...exitFormEvents.map((e) => {
                    return { ...e, dataValues: e.dataValues.filter((d) => d.value) };
                  }),
                ];
          
                return mappings;
              })
              .flat()
              .filter(Boolean);
            console.log("Final eventsMapping length:", state.eventsMapping.length);
          
            return state;
          });
          
          const deduplicateByLatest = (events, formMaps, exitStageIds) => {
            // Build programStage -> syncType lookup from formMaps
            const stageSyncType = {};
            Object.values(formMaps).forEach((form) => {
              if (form.programStage) {
                stageSyncType[form.programStage] = form.syncType;
              }
            });
          
            // Group by (trackedEntity, programStage) to find cross-date duplicates
            const groups = new Map();
            events.forEach((event) => {
              const key = `${event.trackedEntity}||${event.programStage}`;
              if (!groups.has(key)) groups.set(key, []);
              groups.get(key).push(event);
            });
          
            const result = [];
            groups.forEach((groupEvents, key) => {
              const programStage = key.split("||")[1];
              const isLatest =
                exitStageIds.includes(programStage) ||
                stageSyncType[programStage] === "latest";
          
              if (isLatest && groupEvents.length > 1) {
                // Keep only the event with the most recent occurredAt
                const latest = groupEvents.reduce((a, b) =>
                  new Date(a.occurredAt) >= new Date(b.occurredAt) ? a : b
                );
                console.log(
                  `Deduplicating programStage ${programStage}: kept 1 of ${groupEvents.length} events (latest)`
                );
                result.push(latest);
              } else {
                result.push(...groupEvents);
              }
            });
          
            return result;
          };
          
          const mergeEvents = (events) => {
            const eventMap = new Map();
          
            events.forEach((event) => {
              // Create a unique key based on all properties except dataValues
              const key = JSON.stringify({
                program: event.program,
                orgUnit: event.orgUnit,
                trackedEntity: event.trackedEntity,
                enrollment: event.enrollment,
                occurredAt: event.occurredAt,
                programStage: event.programStage,
              });
          
              if (eventMap.has(key)) {
                // Merge dataValues if event already exists
                const existing = eventMap.get(key);
                existing.dataValues = [...existing.dataValues, ...event.dataValues];
              } else {
                // Add new event to map
                eventMap.set(key, { ...event });
              }
            });
          
            return Array.from(eventMap.values());
          };
          
          const F68_CONFIG = {
            warningSignsConcept: "bb939282-3ca7-4c26-9f52-79c01719c276",
            warningSignsAnswers: [
              "2442b56b-4c2a-4855-ba0a-c30153c28793", // Petechiae
              "b19d153f-4dde-4eb0-92fa-3434d82a5943", // Agitation or lethargy
              "56ea8f6e-07a7-44b3-a422-046ca7617a39", // Mucosal bleeding
              "b2583e99-7b07-48c8-a8ca-691f70031a41", // Persistent vomiting
              "1f168818-b2da-489b-9113-a0a1108436d0", // Severe abdominal pain
              "15a5c6b0-d535-4e53-9a30-54469822d291", // Fluid accumulation (lungs or abdomen)
            ],
          };
          
          function mapF68(encounter, events, state) {
            const formMap = state.formMaps[encounter.form.uuid];
            if (!formMap) return [];
          
            const { programStage } = formMap;
            const existingEvent = events?.find((e) => e.programStage === programStage);
          
            const dataValues = [];
          
            // Warning signs parent (I4ftnXcPClh):
            //   TRUE if any specific warning sign is selected (any answer other than 'None of the above')
            const warningSignsObs = encounter.obs.filter(
              (o) => o.concept.uuid === F68_CONFIG.warningSignsConcept
            );
            const hasWarningSign = warningSignsObs.some((o) =>
              F68_CONFIG.warningSignsAnswers.includes(o.value.uuid)
            );
            if (hasWarningSign) {
              dataValues.push({ dataElement: "I4ftnXcPClh", value: "true" });
            }
          
            return [
              {
                programStage,
                event: existingEvent?.event,
                dataValues,
              },
            ];
          }
          
          const F69_CONFIG = {
            treatmentConcept: "d6081b93-291a-4349-a1c7-8a11e7326de1",
            noneAnswer: "68297667-f4d1-4e5d-9cb3-5c95f283f762",
            otherTreatmentAnswers: [
              "309ded30-b62e-4c5e-b55f-5b2a44c56e68", // Other antibiotics
              "94c7cc7e-8279-48e7-86c3-597f47405cb5", // Antifungal
              "6551dc1e-f8db-469c-9929-93c334178390", // Other treatments
            ],
          };
          
          function mapF69(encounter, events, state) {
            const formMap = state.formMaps[encounter.form.uuid];
            if (!formMap) return [];
          
            const { programStage } = formMap;
            const existingEvent = events?.find((e) => e.programStage === programStage);
          
            const dataValues = [];
          
            // Always TRUE — "Are there data to record" (Zd2WqtxnDI9)
            dataValues.push({ dataElement: "Zd2WqtxnDI9", value: "TRUE" });
          
            // Treatment parent (RZ6xnHzHH5J):
            //   TRUE  if any non-None answer selected
            //   FALSE if only None selected
            const treatmentAnswers = encounter.obs.filter(
              (o) => o.concept.uuid === F69_CONFIG.treatmentConcept
            );
            const hasNonNone = treatmentAnswers.some(
              (o) => o.value.uuid !== F69_CONFIG.noneAnswer
            );
            const hasNone = treatmentAnswers.some(
              (o) => o.value.uuid === F69_CONFIG.noneAnswer
            );
            if (hasNonNone || hasNone) {
              dataValues.push({
                dataElement: "RZ6xnHzHH5J",
                value: hasNonNone ? "TRUE" : "FALSE",
              });
            }
          
            // Other treatment required (L003PVb0q56):
            //   TRUE if Other antibiotics OR Antifungal OR Other treatments selected
            const hasOtherTreatment = F69_CONFIG.otherTreatmentAnswers.some((uuid) =>
              treatmentAnswers.some((o) => o.value.uuid === uuid)
            );
            if (hasOtherTreatment) {
              dataValues.push({ dataElement: "L003PVb0q56", value: "TRUE" });
            }
          
            return [
              {
                programStage,
                event: existingEvent?.event,
                dataValues,
              },
            ];
          }
          
          // Combining events and exit events
          fn((state) => {
            const { data, references, response, ...rest } = state;
            rest.eventsMapping = mergeEvents(rest.eventsMapping);
            rest.eventsMapping = deduplicateByLatest(
              rest.eventsMapping,
              rest.formMaps,
              EXIT_EVENT_STAGE_IDS
            );
            return rest;
          });
          
          fnIf(
            (state) => state.missingOptsets.length > 0 && state.testMode,
            (state) => {
              console.log("⚠️  Missing DHIS2 Option Code");
              console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              state.missingOptsets.forEach((opt) => {
                console.log({
                  openMrsQuestion: opt.openMrsQuestion,
                  answerDisplay: opt.answerDisplay,
                  answerValueUuid: opt.answerValueUuid,
                  dhis2DataElementUid: opt.dhis2DataElementUid,
                  dhis2OptionSetUid: opt.dhis2OptionSetUid,
                  formName: opt.metadataFormName,
                  optionSetKey: opt.optionKey,
                });
              });
              console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              return state;
            }
          );
          
      Create-TEIs-Relationship:
        name: Create TEIs Relationship
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          fn((state) => {
            state.relationshipsMapping = Object.values(state.createdChildTeis)
              .map((tei) => {
                const omrsPatientUuid = tei?.attributes.find(
                  ({ attribute }) => attribute === "AYbfTPYMNJH"
                )?.value;
                const childTei = tei?.trackedEntity;
                const parentTei =
                  state.parentTeis[`${state.orgUnit}-${state.program}-${omrsPatientUuid}`]
                    ?.trackedEntity;
                const relationshipType = tei?.relationshipType || "cJJTZ51EK24";
                // :white_check_mark: Add validation to ensure both TEIs exist
                if (!childTei || !parentTei) {
                  console.log(
                    `:warning: Skipping relationship - Missing TEI for patient ${omrsPatientUuid}:`,
                    {
                      hasChildTei: !!childTei,
                      hasParentTei: !!parentTei,
                      program: tei?.program,
                      orgUnit: tei?.orgUnit,
                    }
                  );
                  return null;
                }
                if (childTei !== parentTei) {
                  return {
                    from: {
                      trackedEntityInstance: {
                        trackedEntityInstance: parentTei,
                      },
                    },
                    to: {
                      trackedEntityInstance: {
                        trackedEntityInstance: childTei,
                      },
                    },
                    relationshipType,
                  };
                }
              })
              .filter(Boolean); // :white_check_mark: This now filters out null entries
            console.log(
              `Total relationships to create: ${state.relationshipsMapping.length}`
            );
            return state;
          });
          
          // Check if relationship exist
          each(
            $.relationshipsMapping,
            get("tracker/relationships", {
              trackedEntity: $.data.from.trackedEntityInstance.trackedEntityInstance,
            }).then((state) => {
              const relationship = state.references.at(-1);
              const toTei = relationship.to.trackedEntityInstance.trackedEntityInstance;
              const hasRelationship = state.data.instances.find(
                (r) => r.to.trackedEntity.trackedEntity === toTei
              );
              state.relationshipsToCreate ??= [];
              if (!hasRelationship) {
                state.relationshipsToCreate.push(relationship);
              }
              return state;
            })
          );
          
          // Creating relationship between parent and child tei
          each($.relationshipsToCreate || [], create("relationships", $.data));
          
          fn((state) => {
            const { data, references, response, ...next } = state;
            return next;
          });
          
      Create-Child-TEIs:
        name: Create Child TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          create(
            "tracker",
            {
              trackedEntities: (state) => {
                const childTeis = Object.values(state.childTeisToCreate).map(
                  ({ relationshipType, ...tei }) => {
                    // Skip enrollment creation for program without registration
                    if (tei.program === "od0M4kEn5Rp" && tei.enrollments) {
                      const { enrollments, ...teiWithoutEnrollments } = tei;
                      return teiWithoutEnrollments;
                    }
                    return tei;
                  }
                );
                return childTeis;
              },
            },
            {
              params: {
                atomicMode: "ALL",
                async: false,
              },
            }
          );
          
          fn((state) => {
            state.upsertedTeis =
              state.data.bundleReport.typeReportMap.TRACKED_ENTITY.objectReports.map(
                (report) => report.uid
              );
            return state;
          });
          
          each(
            $.upsertedTeis,
            get(`tracker/trackedEntities/${$.data}`, {
              fields: "*",
            }).then((state) => {
              const {
                trackedEntity,
                programOwners,
                enrollments,
                attributes,
                events,
                orgUnit,
              } = state.data || {};
          
              const program = programOwners.find(
                (po) => po.trackedEntity === trackedEntity && po.orgUnit === orgUnit
              )?.program;
          
              const patientUuid = attributes.find(
                (a) => a.attribute === "AYbfTPYMNJH"
              ).value;
          
              const relationshipType = Object.values(state.formMaps).find(
                (form) =>
                  form.programId === program &&
                  form.orgUnit === orgUnit &&
                  form.formName !== "F00-Registration"
              )?.relationshipId;
          
              // Skip enrollment creation for program without registration
              const skipEnrollment = program === "od0M4kEn5Rp";
          
              state.createdChildTeis ??= {};
              const patientOuProgram = `${orgUnit}-${program}-${patientUuid}`;
              state.createdChildTeis[patientOuProgram] = {
                relationshipType,
                trackedEntity,
                events: enrollments?.[0]?.events ?? events,
                enrollments: skipEnrollment ? null : enrollments,
                attributes,
                orgUnit,
                program,
              };
          
              return state;
            })
          );
          
          fn((state) => {
            const { data, references, response, ...next } = state;
            next.existingTeis = { ...next.existingTeis, ...next.createdChildTeis };
            return next;
          });
          
      Missing-OptionSets:
        name: Missing OptionSets
        adaptor: '@openfn/language-googlesheets@4.0.7'
        credential: null
        body: |
          // Only run if there are missing option sets to report
          fn((state) => {
            const CHUNK_SIZE = 10000;
            const missingOptsets = state.missingOptsets;
          
            const headers = [
              "Timestamp",
              "OpenMRS Question",
              "Concept External ID",
              "Answer Display",
              "Answer UUID",
              "DHIS2 DE UID",
              "DHIS2 OptionSet UID",
              "Metadata Form",
              "Encounter UUID",
              "Patient UUID",
              "Source File",
            ];
          
            const allRows = missingOptsets.map((opt) => [
              opt.timestamp,
              opt.openMrsQuestion,
              opt.conceptExternalId,
              opt.answerDisplay,
              opt.answerValueUuid,
              opt.dhis2DataElementUid,
              opt.dhis2OptionSetUid,
              opt.metadataFormName,
              opt.encounterUuid,
              opt.patientUuid,
              opt.sourceFile,
            ]);
          
            state.allRows = allRows;
            state.headers = headers;
          
            return state;
          });
          
          // Get existing data to check for duplicates
          getValues(
            "13yjqiejKFf6HlNCvgfgaKNi9Gffhq22RUTwXKUPR36k",
            "Missing OptionSets Mappings"
          );
          
          // Filter duplicates and prepare chunks
          const CHUNK_SIZE = 10000;
          fn((state) => {
            const allRows = state.allRows;
          
            // Get existing data (skip header row)
            const existingData = state.data?.values?.slice(1) || [];
          
            // Create a Set of unique keys from existing data
            // Key format: conceptExternalId|answerUuid|dhis2DeUid|encounterUuid
            const existingKeys = new Set(
              existingData.map(row => `${row[2]}|${row[4]}|${row[5]}|${row[8]}`)
            );
          
            // Filter out duplicates
            const newRows = allRows.filter(row => {
              const key = `${row[2]}|${row[4]}|${row[5]}|${row[8]}`;
              return !existingKeys.has(key);
            });
          
            console.log(`Total errors found: ${allRows.length}`);
            console.log(`New unique errors to add: ${newRows.length}`);
            console.log(`Duplicates filtered out: ${allRows.length - newRows.length}`);
          
            const chunks = [];
            for (let i = 0; i < newRows.length; i += CHUNK_SIZE) {
              chunks.push(newRows.slice(i, i + CHUNK_SIZE));
            }
          
            const nextRow = existingData.length + 2; // +2 for header and 1-indexing
          
            state.chunks = chunks;
            state.nextRow = nextRow;
            state.newRowCount = newRows.length;
          
            return state;
          });
          
          // Append data chunks (will add after existing rows)
          each(
            (state) => state.chunks,
            batchUpdateValues({
              spreadsheetId: "13yjqiejKFf6HlNCvgfgaKNi9Gffhq22RUTwXKUPR36k",
              range: (state) => {
                const currentChunkIndex = state.index;
                const startRow = state.nextRow + (currentChunkIndex * CHUNK_SIZE);
                return `Missing OptionSets Mappings!A${startRow}`;
              },
              values: (state) => state.data,
            })
          );
          
          // Log summary statistics
          fn((state) => {
            if (state.missingOptsets && state.missingOptsets.length > 0) {
              const totalErrors = state.missingOptsets.length;
              const uniqueOptionSets = new Set(
                state.missingOptsets.map((opt) => opt.dhis2OptionSetUid),
              ).size;
              const uniqueDataElements = new Set(
                state.missingOptsets.map((opt) => opt.dhis2DataElementUid),
              ).size;
          
              const googleSheetUrl =
                "https://docs.google.com/spreadsheets/d/13yjqiejKFf6HlNCvgfgaKNi9Gffhq22RUTwXKUPR36k/edit#gid=0";
          
              console.log("");
              console.log("⚠️  Missing DHIS2 Option Codes Detected");
              console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              console.log(`Metadata File: ${state.sourceFile}`);
              console.log(`Total Errors: ${totalErrors}`);
              console.log(`Affected Option Sets: ${uniqueOptionSets}`);
              console.log(`Affected Data Elements: ${uniqueDataElements}`);
              console.log(`View Details: ${googleSheetUrl}`);
              console.log("━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
              console.log("");
            } else {
              console.log("✅ No missing DHIS2 Option Codes detected");
            }
          
            return { lastRunDateTime: state.lastRunDateTime };
          });
    triggers:
      cron:
        type: cron
        cron_expression: '0 0 * * *'
        enabled: true
    edges:
      Get-Encounters->Get-Parent-and-Child-TEIs:
        source_job: Get-Encounters
        target_job: Get-Parent-and-Child-TEIs
        condition_type: js_expression
        condition_label: has-encounters
        condition_expression: |
          !state.errors && state.encounters?.length > 0
          
        enabled: true
      cron->Get-Patients:
        source_trigger: cron
        target_job: Get-Patients
        condition_type: always
        enabled: true
      Mappings->Upsert-TEIs:
        source_job: Mappings
        target_job: Upsert-TEIs
        condition_type: js_expression
        condition_label: has-patients
        condition_expression: |
          state.patients.length > 0 && !state.errors
          
        enabled: true
      Mappings->Get-Encounters:
        source_job: Mappings
        target_job: Get-Encounters
        condition_type: js_expression
        condition_label: has-no-patients
        condition_expression: |
          !state.errors && state.patients.length === 0
          
        enabled: true
      Create-Events->Update-TEIs:
        source_job: Create-Events
        target_job: Update-TEIs
        condition_type: js_expression
        condition_label: has-gender-updated
        condition_expression: |
          state?.teisToUpdate?.length > 0
          
        enabled: true
      Get-Patients->Mappings:
        source_job: Get-Patients
        target_job: Mappings
        condition_type: on_job_success
        enabled: true
      Event-Mappings->Create-Events:
        source_job: Event-Mappings
        target_job: Create-Events
        condition_type: js_expression
        condition_label: has-events
        condition_expression: |
          state?.eventsMapping?.length > 0 && !state.errors
          
        enabled: true
      Get-Parent-and-Child-TEIs->Create-Child-TEIs:
        source_job: Get-Parent-and-Child-TEIs
        target_job: Create-Child-TEIs
        condition_type: js_expression
        condition_label: has-child-teis-to-create
        condition_expression: |
          !state.errors && Object.keys(state?.childTeisToCreate).length > 0
        enabled: true
      Create-Child-TEIs->Create-TEIs-Relationship:
