              (i) => i.type === "DHIS2_PATIENT_NUMBER"
            )?.["omrs identifierType"]; //DHIS2 ID or DHIS2 Patient Number
          
            rest.openmrsAutoId = identifiers.find((i) => i.type === "OPENMRS_AUTO_ID")?.[
              "omrs identifierType"
            ]; //MSF ID or OpenMRS Patient Number
          
            rest.dhis2Map = dhis2Map;
            return rest;
          });
          
      Upsert-TEIs:
        name: Upsert TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          function chunkArray(array, size) {
            const chunks = [];
            for (let i = 0; i < array.length; i += size) {
              chunks.push(array.slice(i, i + size));
            }
            return chunks;
          }
          
          function remainderMonths(dob, ageYears, todayDate) {
            const birth = new Date(dob);
            const today = new Date(todayDate);
          
            // Date when the person turned `ageYears`
            const birthdayAtAge = new Date(
              birth.getFullYear() + ageYears,
              birth.getMonth(),
              birth.getDate()
            );
          
            let months =
              (today.getFullYear() - birthdayAtAge.getFullYear()) * 12 +
              (today.getMonth() - birthdayAtAge.getMonth());
          
            // Adjust if today's day is before birth day
            if (today.getDate() < birthdayAtAge.getDate()) {
              months -= 1;
            }
          
            return months;
          }
          
          const findIdentifierByUuid = (identifiers, targetUuid) =>
            identifiers.find((i) => i.identifierType.uuid === targetUuid)?.identifier;
          
          const findAttrValue = (uuid, attributes) => {
            return attributes.find((a) => a.attributeType.uuid === uuid)?.value;
          };
          
          const findOptCode = (attrValue, optsMap, optionSetKey) => {
            if (typeof attrValue === "string") {
              return attrValue;
            }
            if (typeof attrValue === "object") {
              const { uuid, display } = attrValue;
          
              const optionKey = `patient-${uuid}`;
              const matchingOptionSet = optionSetKey[optionKey];
              const optCodeByExtId = optsMap.find(
                (o) =>
                  o["value.uuid - External ID"] === uuid &&
                  o["DHIS2 Option Set UID"] === matchingOptionSet
              )?.["DHIS2 Option Code"];
          
              if (optCodeByExtId) {
                return optCodeByExtId;
              }
              const optCodeByDisplayAndExtId = optsMap.find(
                (o) =>
                  o["value.uuid - External ID"] === uuid &&
                  o["value.display - Answers"] === display
              )?.["DHIS2 Option Code"];
          
              return optCodeByDisplayAndExtId;
            }
            return null;
          };
          const buildTeiMapping = (omrsPatient, patientTei, mapConfig) => {
            const genderMap = {
              M: "male",
              O: "unknown",
              F: "female",
              U: "unknown",
            };
            const {
              orgUnit,
              program,
              optsMap,
              optionSetKey,
              formMaps,
              placeOflivingMap,
              patientProgramStage,
              dhis2PatientNumber,
              openmrsAutoId,
              dhis2Map,
            } = mapConfig;
          
            const enrolledAt = omrsPatient.auditInfo.dateCreated.substring(0, 10);
          
            const patientMap = formMaps.patient.dataValueMap;
            const statusAttrMaps = Object.keys(patientMap).map((d) => {
              const attrTypeUuid = patientMap[d].split("::")[0];
              const attrValue = findAttrValue(
                attrTypeUuid,
                omrsPatient.person.attributes
              );
              return {
                attribute: d,
                value: findOptCode(attrValue, optsMap, optionSetKey),
              };
            });
          
            const standardAttr = [
              {
                attribute: dhis2Map.attr.ageInMonth,
                value: remainderMonths(
                  omrsPatient.person.birthdate,
                  omrsPatient.person.age,
                  new Date()
                ),
              },
              {
                attribute: dhis2Map.attr.firstName,
                value: omrsPatient.person?.names[0]?.givenName,
              },
              {
                attribute: dhis2Map.attr.lastName,
                value: omrsPatient.person?.names[0]?.familyName,
              },
              {
                attribute: dhis2Map.attr.patientNumber,
                value:
                  findIdentifierByUuid(omrsPatient.identifiers, dhis2PatientNumber) ||
                  findIdentifierByUuid(omrsPatient.identifiers, openmrsAutoId), //map OMRS ID if no DHIS2 id
              },
              {
                attribute: dhis2Map.attr.omrsPatientNumber,
                value: findIdentifierByUuid(omrsPatient.identifiers, openmrsAutoId),
              },
              {
                attribute: dhis2Map.attr.omrsPatientUuid,
                value: omrsPatient.uuid,
              },
          
              {
                attribute: dhis2Map.attr.ageInYears,
                value: omrsPatient.person.age,
              },
              {
                attribute: dhis2Map.attr.birthdate,
                value: omrsPatient.person.birthdate?.slice(0, 10),
              },
              {
                attribute: dhis2Map.attr.placeOfliving,
                value:
                  placeOflivingMap[omrsPatient.person?.preferredAddress?.cityVillage],
              },
            ];
          
            //filter out attributes that don't have a value from dhis2
            const filteredAttr = standardAttr.filter((a) => a.value);
            const filteredStatusAttr = statusAttrMaps.filter((a) => a.value);
            const genderAttr = {
              attribute: dhis2Map.attr.sex,
              value: genderMap[omrsPatient.person.gender],
            };
            const payload = {
              program,
              orgUnit,
              attributes: [...filteredAttr, ...filteredStatusAttr, genderAttr],
            };
            // console.log('mapped dhis2 payloads:: ', JSON.stringify(payload, null, 2));
            const enrollments = [
              {
                orgUnit,
                program,
                enrolledAt,
                programStage: patientProgramStage, //'MdTtRixaC1B',
              },
            ];
          
            if (!patientTei) {
              payload.trackedEntityType = "cHlzCA2MuEF";
          
              payload.enrollments = enrollments;
            }
          
            if (patientTei) {
              payload.trackedEntity = patientTei.trackedEntity;
              payload.trackedEntityType = patientTei.trackedEntityType;
            }
          
            return payload;
          };
          
          const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          
          each(
            (state) => chunkArray(state.patientUuids, 100),
            get("tracker/trackedEntities", {
              orgUnit: $.orgUnit,
              filter: (state) => [
                `${state.dhis2Map.attr.omrsPatientUuid}:IN:${state.data.join(";")}`,
              ],
              program: $.program,
              fields: "*",
            }).then((state) => {
              state.foundTrackedEntities ??= [];
              state.foundTrackedEntities.push(...state.data.instances);
              return state;
            })
          );
          
          const findTeiByUuid = (patientUuid, teis, omrsPatientUuid) => {
            return teis.find((tei) => {
              return (
                tei.attributes.find(
                  (attribute) => attribute.attribute === omrsPatientUuid
                )?.value === patientUuid
              );
            });
          };
          fn((state) => {
            state.patientsMapping = state.patients.map((patient) => {
              const patientTei = findTeiByUuid(
                patient.uuid,
                state.foundTrackedEntities,
                state.dhis2Map.attr.omrsPatientUuid
              );
          
              const mapConfig = {
                placeOflivingMap: state.placeOflivingMap,
                orgUnit: state.orgUnit,
                program: state.program,
                patientProgramStage: state.patientProgramStage,
                formMaps: state.formMaps,
                optsMap: state.optsMap,
                optionSetKey: state.optionSetKey,
                dhis2PatientNumber: state.dhis2PatientNumber,
                openmrsAutoId: state.openmrsAutoId,
                dhis2Map: state.dhis2Map,
              };
              return buildTeiMapping(patient, patientTei, mapConfig);
            });
          
            return state;
          });
          
          // Bulk upsert
          create(
            "tracker",
            { trackedEntities: $.patientsMapping },
            {
              params: {
                atomicMode: "ALL",
                importStrategy: "CREATE_AND_UPDATE",
                async: false,
              },
            }
          );
          fn((state) => {
            const {
              data,
              response,
              references,
              patients,
              patientsUpsert,
              placeOflivingMap,
              foundTrackedEntities,
              identifiers,
              ...next
            } = state;
          
            return next;
          });
          
      Get-Encounters:
        name: Get Encounters
        adaptor: '@openfn/language-openmrs@4.3.0'
        credential: michael.bontyes@geneva.msf.org-openmrs
        body: |
          function removeLinks(data) {
            if (Array.isArray(data)) {
              return data.map(removeLinks);
            }
          
            if (typeof data === "object" && data !== null) {
              const { links, ...rest } = data;
              return Object.fromEntries(
                Object.entries(rest).map(([key, value]) => [key, removeLinks(value)])
              );
            }
          
            return data;
          }
          
          function removeNulls(data) {
            if (Array.isArray(data)) {
              return data.filter((item) => item !== null).map(removeNulls);
            }
          
            if (typeof data === "object" && data !== null) {
              const result = {};
              for (const [key, value] of Object.entries(data)) {
                if (value !== null) {
                  result[key] = removeNulls(value);
                }
              }
              return result;
            }
          
            return data;
          }
          // Fetch patient encounters
          each(
            $.patientUuids,
            get("encounter", { patient: $.data, v: "full" }).then((state) => {
              state.allEncounters ??= [];
              state.allEncounters.push(
                // v2FormsUuids are for mental health forms
                // ...state.data.results.filter(e =>
                //   state.v2FormUuids.includes(e?.form?.uuid)
                // )
                ...state.data.results.filter((e) =>
                  state.formUuids.includes(e?.form?.uuid)
                )
              );
          
              const patientUuid = state.references.at(-1);
              const filteredEncounters = state.formUuids.map((formUuid) =>
                state.data.results
                  .filter(
                    (e) =>
                      e.auditInfo.dateCreated >= state.cursor &&
                      e?.form?.uuid === formUuid
                  )
                  .sort(
                    (a, b) =>
                      new Date(b.auditInfo.dateCreated) -
                      new Date(a.auditInfo.dateCreated)
                  )
              );
          
              const encounters = filteredEncounters
                .map((pe) => {
                  const isLatestForm = pe.find((e) => {
                    return state.formMaps[e?.form?.uuid]?.syncType === "latest";
                  });
                  if (isLatestForm) {
                    return [isLatestForm];
                  } else {
                    const allPatientEncounter = pe.filter(
                      (e) => state.formMaps[e?.form?.uuid]?.syncType === "all"
                    );
                    return allPatientEncounter;
                  }
                })
                .flat();
          
              state.encounters ??= [];
              state.encounters.push(...encounters);
          
              console.log(
                encounters?.length,
                `# of filtered encounters found in OMRS for ${patientUuid}`
              );
          
              return state;
            })
          );
          
          fn((state) => {
            const {
              data,
              index,
              response,
              references,
              allResponse,
              patientUuids,
              patients,
              ...next
            } = state;
          
            if (next.encounters?.length) {
              next.encounters = next.encounters.map((encounter) => {
                const { uuid, patient, obs, form, encounterDatetime } = removeLinks(
                  removeNulls(encounter)
                );
          
                return {
                  uuid,
                  patient: {
                    uuid: patient.uuid,
                    display: patient.display,
                  },
                  obs: obs.map((o) => {
                    return {
                      uuid: o.uuid,
                      concept: o.concept,
                      display: o.display,
                      formFieldPath: o.formFieldPath,
                      value: o.value,
                      person: o.person,
                    };
                  }),
                  form: {
                    uuid: form.uuid,
                    display: form.display,
                    description: form.description,
                    name: form.name,
                  },
                  encounterDatetime,
                };
              });
              console.log(next.encounters?.length, "# of new encounters to sync to dhis2");
            } else {
              console.log("No encounters found for cursor: ", next.cursor);
            }
            next.allEncounters = next.allEncounters?.map((encounter) => {
              const { uuid, patient, obs, form, encounterDatetime } = removeLinks(
                removeNulls(encounter)
              );
          
              return {
                uuid,
                patient: {
                  uuid: patient.uuid,
                  display: patient.display,
                },
                obs: obs.map((o) => {
                  return {
                    uuid: o.uuid,
                    concept: o.concept,
                    display: o.display,
                    formFieldPath: o.formFieldPath,
                    value: o.value,
                    person: o.person,
                  };
                }),
                form: {
                  uuid: form.uuid,
                  display: form.display,
                  description: form.description,
                  name: form.name,
                },
                encounterDatetime,
              };
            });
          
            return next;
          });
          
      Get-Parent-and-Child-TEIs:
        name: Get Parent and Child TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          
          const findTeiByPatientUuid = (
            patientUuid,
            teis,
            program = null,
            orgUnit = null
          ) => {
            return teis.find((tei) => {
              const omrsPatientUuid = tei.attributes.find(
                ({ attribute }) => attribute === "AYbfTPYMNJH"
              )?.value;
          
              if (omrsPatientUuid !== patientUuid) return false;
          
              if (program && orgUnit) {
                return tei.programOwners?.some(
                  (po) => po.program === program && tei.orgUnit === orgUnit
                );
              }
          
              return true;
            });
          };
          
          fn((state) => {
            // Group encounters by patient UUID
            state.encountersByPatient = state.encounters.reduce((acc, obj) => {
              const key = obj.patient.uuid;
              if (!acc[key]) {
                acc[key] = [];
              }
              acc[key].push(obj);
              return acc;
            }, {});
            state.parentTeis ??= {};
            state.currChildTeis ??= {};
            state.missingParentTeis ??= {};
            state.childTeisToCreate ??= {};
            return state;
          });
          // Check if patient if exist in parent programs
          get("tracker/trackedEntities", {
            orgUnit: $.orgUnit,
            program: $.program,
            filter: (state) => [
              `AYbfTPYMNJH:IN:${Object.keys(state.encountersByPatient).join(";")}`,
            ],
            fields:
              "trackedEntityType, orgUnit, trackedEntity, attributes, programOwners, enrollments",
          });
          
          fn((state) => {
            const encountersPatient = Object.keys(state.encountersByPatient);
            encountersPatient.forEach((patientUuid) => {
              const parentTei = findTeiByPatientUuid(patientUuid, state.data.instances);
              const patientOuProgram = `${state.orgUnit}-${state.program}-${patientUuid}`;
              if (parentTei?.trackedEntity) {
                console.log("Parent TEI found:", parentTei.trackedEntity);
          
                state.parentTeis[patientOuProgram] = parentTei;
              } else {
                console.log("Parent TEI Not Found for Patient:", patientUuid);
                state.missingParentTeis[patientOuProgram] =
                  state.encountersByPatient[patientUuid];
              }
            });
          
            return state;
          });
          
          fn((state) => {
            state.childPrograms = state.encounters.reduce((acc, obj) => {
              const formUuid = obj.form.uuid;
              const patientUuid = obj.patient.uuid;
              const orgUnit = state.formMaps[formUuid]?.orgUnit;
              const program = state.formMaps[formUuid]?.programId;
              const programStage = state.formMaps[formUuid]?.programStage;
              const relationshipType = state.formMaps[formUuid]?.relationshipId;
              const encounterKey = `${orgUnit}-${program}`;
              const parentKey = `${state.orgUnit}-${state.program}`;
              if (parentKey !== encounterKey) {
                if (!acc[encounterKey]) {
                  acc[encounterKey] = {
                    orgUnit,
                    program,
                    relationshipType,
                    programStage,
                    patientUuids: [patientUuid],
                  };
                }
          
                if (!acc[encounterKey].patientUuids.includes(patientUuid)) {
                  acc[encounterKey].patientUuids.push(patientUuid);
                }
              }
          
              return acc;
            }, {});
          
            return state;
          });
          
          // Search if child teis exists for each encounter
          each(
            (state) => Object.values(state.childPrograms),
            get("tracker/trackedEntities", (state) => {
              const { orgUnit, program, patientUuids } = state.data;
              return {
                orgUnit,
                program,
                filter: [`AYbfTPYMNJH:IN:${patientUuids.join(";")}`],
                fields:
                  "trackedEntityType, orgUnit, trackedEntity, attributes, programOwners, relationshipType, enrollments",
              };
            })
              .then((state) => {
                const { orgUnit, program, patientUuids, relationshipType, programStage } =
                  state.references.at(-1);
          
                patientUuids.forEach((patientUuid) => {
                  const tei = findTeiByPatientUuid(
                    patientUuid,
                    state.data.instances,
                    program,
                    orgUnit
                  );
          
                  const patientOuProgram = `${orgUnit}-${program}-${patientUuid}`;
                  if (tei?.trackedEntity) {
                    console.log("Child TEI found:", tei.trackedEntity);
                    state.currChildTeis[patientOuProgram] = {
                      ...tei,
                      relationshipType,
                      orgUnit,
                      program,
                    };
                  }
                  if (!tei?.trackedEntity) {
                    console.log("Child TEI not found for patient:", patientUuid);
                    const parentTei =
                      state?.parentTeis[
                        `${state.orgUnit}-${state.program}-${patientUuid}`
                      ];
                    state.childTeisToCreate[patientOuProgram] = {
                      relationshipType,
                      trackedEntityType: parentTei?.trackedEntityType || "cHlzCA2MuEF",
                      enrollments: [
                        {
                          programStage,
                          orgUnit,
                          program,
                          enrolledAt: new Date().toISOString().split("T")[0],
                          attributes: parentTei?.attributes.filter((attribute) =>
                            [
                              "P4wdYGkldeG", //DHIS2 ID ==> "Patient Number"
                            ].includes(attribute.attribute)
                          ),
                        },
                      ],
          
                      attributes: parentTei?.attributes || [],
                      orgUnit,
                      program,
                    };
                  }
                });
          
                return state;
              })
              .then(async (state) => {
                await delay(2000);
                return state;
              })
          );
          
          fn((state) => {
            const { data, references, response, currChildTeis, ...next } = state;
            const parentTeis = next.parentTeis;
            next.existingTeis = { ...currChildTeis, ...parentTeis };
            return next;
          });
          
      Create-Events:
        name: Create Events
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          const buildTeiUrl = (baseUrl, { trackedEntity, program, orgUnit }) => {
            return `${baseUrl}/dhis-web-tracker-capture/index.html#/dashboard?tei=${trackedEntity}&program=${program}&ou=${orgUnit}`;
          };
          
          const buildEventsUrl = (baseUrl, { program, orgUnit }) => {
            return `${baseUrl}/dhis-web-capture/index.html#/?orgUnitId=${orgUnit}&programId=${program}`;
          };
          // Create or update events for each encounter
          create(
            "tracker",
            {
              events: (state) => {
                const baseUrl = state.configuration.hostUrl;
          
                const groupedEvents = state.eventsMapping.reduce((acc, event) => {
                  const { trackedEntity, program, orgUnit } = event;
                  const key = `${trackedEntity}-${program}-${orgUnit}`;
                  if (!acc[key]) {
                    acc[key] = [];
                  }
                  acc[key].push(event);
                  return acc;
                }, {});
                Object.entries(groupedEvents).forEach(([key, events]) => {
                  const [trackedEntity, program, orgUnit] = key.split("-");
          
                  const teiUrl = buildTeiUrl(baseUrl, {
                    trackedEntity,
                    program,
                    orgUnit,
                  });
                  const eventsUrl = buildEventsUrl(baseUrl, { program, orgUnit });
          
                  console.log({ events, teiUrl, eventsUrl });
                });
                return state.eventsMapping;
              },
            },
            {
              params: {
                async: false,
                dataElementIdScheme: "UID",
                importStrategy: "CREATE_AND_UPDATE",
              },
            }
          );
          
          const findlatestAnswer = (encounters, conceptUuid) => {
            const latestAnswer = encounters.reduce((acc, e) => {
              const answer = e.obs.find((o) => o.concept.uuid === conceptUuid);
              if (answer) {
                const personUuid = answer.person.uuid;
                if (
                  !acc[personUuid] ||
                  new Date(answer.obsDatetime) > new Date(acc[personUuid].obsDatetime)
                ) {
                  acc[personUuid] = { ...answer, formUuid: e.form.uuid };
                }
              }
              return acc;
            }, {});
          
            return Object.values(latestAnswer);
          };
          
          fn((state) => {
            const {
              encounters,
              existingTeis,
              parentTeis,
              program,
              orgUnit,
              optsMap,
              // Lighten state by removing unused properties
              formMaps,
              optionSetKey,
              eventsMapping,
              formUuids,
              references,
              data,
              response,
              ...next
            } = state;
          
            const genderMap = optsMap
              .filter((o) => o["DHIS2 DE UID"] === "qptKDiv9uPl")
              .reduce((acc, obj) => {
                acc[obj["value.display - Answers"]] = obj["DHIS2 Option Code"];
                return acc;
              }, {});
          
            const latestGenderUpdate = findlatestAnswer(
              encounters,
              "ec42d68d-3e23-43de-b8c5-a03bb538e7c7"
            );
          
            const genderUpdated = latestGenderUpdate
              .map((answer) => {
                const chilProgram = formMaps[answer.formUuid]?.programId;
                const childOrgUnit = formMaps[answer.formUuid]?.orgUnit;
                const personUuid = answer?.person?.uuid;
                const parentTei = parentTeis[personUuid]?.trackedEntity;
          
                const childTei =
                  existingTeis[`${childOrgUnit}-${chilProgram}-${personUuid}`]
                    ?.trackedEntity;
          
                const mappings = [];
                const sharedMapping = {
                  trackedEntityType: "cHlzCA2MuEF",
                  attributes: [
                    {
                      attribute: "qptKDiv9uPl", //gender
                      value: genderMap[answer.value.display],
                    },
                    {
                      attribute: "AYbfTPYMNJH", //OpenMRS Patient UID to use to upsert TEI
                      value: answer.person.uuid,
                    },
                  ],
                };
                if (!childTei) {
                  console.log("No TEI found for person", answer.person.uuid);
                }
                if (childTei) {
                  mappings.push({
                    ...sharedMapping,
                    trackedEntity: childTei,
                    program: chilProgram,
                    orgUnit: childOrgUnit,
                  });
                }
                if (parentTei) {
                  mappings.push({
                    ...sharedMapping,
                    trackedEntity: parentTei,
                    program,
                    orgUnit,
                  });
                }
                return mappings;
              })
              .filter(Boolean)
              .flat();
          
            const latestEducationUpdate = findlatestAnswer(
              encounters,
              "cc3a5a7a-abfe-4630-b0c0-c1275c6cbb54"
            );
          
            // console.log({ latestEducationUpdate })
            const educationUpdated = latestEducationUpdate
              .map((answer) => {
                const chilProgram = formMaps[answer.formUuid]?.programId;
                const childOrgUnit = formMaps[answer.formUuid]?.orgUnit;
                const personUuid = answer.person.uuid;
                const parentTei = parentTeis[personUuid]?.trackedEntity;
                const childTei =
                  existingTeis[`${childOrgUnit}-${chilProgram}-${personUuid}`]
                    ?.trackedEntity;
                console.log({ parentTei, childTei });
                const mappings = [];
                const sharedMapping = {
                  trackedEntityType: "cHlzCA2MuEF",
                  attributes: [
                    {
                      attribute: "Dggll4f9Efj", //education
                      value: optsMap.find(
                        (o) => o["value.display - Answers"] === answer.value.display
                      )?.["DHIS2 Option Code"], //map to DHIS2 Option Code in optsMap
                    },
                  ],
                };
                if (!childTei) {
                  console.log("No TEI found for person", answer.person.uuid);
                }
          
                if (parentTei) {
                  mappings.push({
                    trackedEntity: parentTei,
                    program,
                    orgUnit,
                    ...sharedMapping,
                  });
                }
                if (childTei) {
                  mappings.push({
                    trackedEntity: childTei,
                    program: chilProgram,
                    orgUnit: childOrgUnit,
                    ...sharedMapping,
                  });
                }
          
                return mappings;
              })
              .filter(Boolean)
              .flat();
          
            return {
              ...next,
              teisToUpdate: [...genderUpdated, ...educationUpdated],
            };
          });
          
          // fnIf(
          //   (state) => state.teisToUpdate.length === 0,
          //   ({ lastRunDateTime }) => ({ lastRunDateTime })
          // );
          
      Update-TEIs:
        name: Update TEIs
        adaptor: '@openfn/language-dhis2@5.0.1'
        credential: michael.bontyes@geneva.msf.org-dhis2
        body: |
          // Update TEIs
          create(
            "tracker",
            { trackedEntities: $.teisToUpdate },
            { params: { async: false, importStrategy: "UPDATE" } }
          );
          
          fn(({ lastRunDateTime }) => ({ lastRunDateTime }));
          
      Event-Mappings:
        name: Event Mappings
        adaptor: '@openfn/language-common@2.1.1'
        credential: null
        body: |
          const extractAnswerValue = (answer) => {
            if (!answer) return undefined;
            if (typeof answer.value === "string") return answer.value;
            if (typeof answer.value === "object") return answer.value.display;
          };
          function formatTime(time) {
            const match = time.match(/^(\d{2}:\d{2})/);
            return match ? match[1] : null;
          }
          
          const findAnswerByConcept = (encounter, conceptUuid, questionId) => {
            if (questionId) {
              const answer = encounter.obs.find(
                (o) => o.concept.uuid === conceptUuid && o.formFieldPath === questionId
              );
          
              const value = extractAnswerValue(answer);
              return value;
            }
            const answer = encounter.obs.find((o) => o.concept.uuid === conceptUuid);
            return extractAnswerValue(answer);
          };
          
          // Helper functions for finding observations
          const findObsByConcept = (encounter, conceptUuid) => {
            const [conceptId, questionId] = conceptUuid.split("-rfe-");
            const answer = encounter.obs.find(
              (o) =>
                o.concept.uuid === conceptId &&
                (questionId ? o.formFieldPath === `rfe-${questionId}` : true)
            );
            return answer;
          };
          
          const conceptAndValue = (encounter, conceptUuid, valueUuid) => {
            const answer = encounter.obs.find(
              (o) => o.concept.uuid === conceptUuid && o.value.uuid === valueUuid
            );
            return answer ? "TRUE" : "FALSE";
          };
          const conceptNotValue = (encounter, conceptUuid, valueUuid) => {
            const answer = encounter.obs.find(
              (o) => o.concept.uuid === conceptUuid && o.value.uuid !== valueUuid
            );
            return answer ? "TRUE" : "FALSE";
          };
          
          const conceptTrueOnly = (encounter, conceptUuid) => {
            const answer = encounter.obs.find(
              (o) =>
                o.concept.uuid === conceptUuid &&
                ["yes", "true"].includes(o?.value?.display?.toLowerCase())
            );
            return answer ? "TRUE" : undefined;
          };
          
          const conceptAndValueTrueOnly = (encounter, conceptUuid, valueUuid) => {
            const answer = encounter.obs.find(
              (o) => o.concept.uuid === conceptUuid && o.value.uuid === valueUuid
            );
            return answer ? "TRUE" : undefined;
          };
          
          const multiSelectAns = (encounter, multiSelectQns) => {
            const dataValues = multiSelectQns
              .map((q) =>
                q.qns
                  .map((qn) => {
                    const dataElement = qn.clde;
                    const ans = encounter.obs.find(
                      (obs) =>
                        obs.value.uuid === qn.multiAns &&
                        obs.formFieldPath === q.qid &&
                        obs.concept.uuid === q.extId
                    );
                    let value = undefined;
                    if (qn.type === "TRUE_ONLY") {
                      value = ans ? "true" : undefined;
                    }
                    if (qn.type === "BOOLEAN") {
                      value = ans ? "true" : "false";
                    }
                    return { dataElement, value };
                  })
                  .filter(Boolean)
              )
              .flat()
              .filter(Boolean);
          
            return dataValues;
          };
          const toTrueOrFalse = (value) => {
            if (["true", "yes"].includes(value.toLowerCase())) {
              return "true";
            }
            if (["false", "no"].includes(value.toLowerCase())) {
              return "false";
            }
            return value;
          };
          
          const dataValueByConcept = (encounter, de, state) => {
            const { dataElement, conceptUuid, questionId, type } = de || {};
          
            const answer = encounter.obs.find((o) => o.concept.uuid === conceptUuid);
            const isObjectAnswer = answer && typeof answer.value === "object";
            const isStringAnswer = answer && typeof answer.value === "string";
            const isNumberAnswer = answer && typeof answer.value === "number";
          
            if (isStringAnswer && type === "time") {
              return answer.value.substring(11, 16);
            }
          
            if (isStringAnswer || isNumberAnswer) {
              return answer.value;
            }
          
            if (isObjectAnswer) {
              if (type === "true_only" && answer.value.display.toLowerCase() === "yes") {
                return "true";
              }
              if (type === "boolean") {
                return toTrueOrFalse(answer.value.display);
              }
              const optionKey = questionId
                ? `${encounter.form.uuid}-${answer.concept.uuid}-${questionId}`
                : `${encounter.form.uuid}-${answer.concept.uuid}`;
          
              const matchingOptionSet = state.optionSetKey[optionKey];
          
              const opt = state.optsMap.find(
                (o) =>
                  o["value.uuid - External ID"] === answer.value.uuid &&
                  o["DHIS2 Option Set UID"] === matchingOptionSet
              );
          
              if (!opt && matchingOptionSet) {
                console.log(
                  `No opt found for External id ${answer.value.uuid} and DHIS2 OptionSet ${matchingOptionSet}`
                );
              }
          
              const matchingOption = opt?.["DHIS2 Option Code"];
          
              if (!matchingOption) {
                const optSet = {
                  timestamp: new Date().toISOString(),
                  openMrsQuestion: answer.concept.display || "N/A",
                  conceptExternalId: answer.concept.uuid,
                  answerDisplay: answer.value.display,
                  answerValueUuid: answer.value.uuid,
                  dhis2DataElementUid: dataElement,
                  dhis2OptionSetUid: matchingOptionSet || "N/A",
                  metadataFormName: encounter.form.name || encounter.form.uuid,
                  encounterUuid: encounter.uuid,
                  patientUuid: encounter.patient.uuid,
                  sourceFile: state.sourceFile,
                  optionKey,
                };
                // Capture missing DHIS2 Option Codes for tracking
                state.missingOptsets.push(optSet);
              }
          
              if (["FALSE", "No"].includes(matchingOption)) return "false";
              if (["TRUE", "Yes"].includes(matchingOption)) return "true";
          
              return matchingOption;
            }
          };
          
          const findDataValue = (encounter, dataElement, state) => {
            const form = state.formMaps[encounter.form.uuid];
            const [conceptUuid, type, questionId] =
              form.dataValueMap[dataElement]?.split("::") || [];
            const answer = encounter.obs.find(
              (o) =>
                o.concept.uuid === conceptUuid &&
                (questionId ? o.formFieldPath === questionId : true)
            );
            const isObjectAnswer = answer && typeof answer.value === "object";
            const isStringAnswer = answer && typeof answer.value === "string";
            const isNumberAnswer = answer && typeof answer.value === "number";
          
            if (isStringAnswer && type === "time") {
              return answer.value.substring(11, 16);
            }
            if (isStringAnswer || isNumberAnswer) {
              return answer.value;
            }
          
            if (isObjectAnswer) {
              if (type === "true_only" && answer.value.display.toLowerCase() === "yes") {
                return "true";
              }
              if (type === "boolean") {
                return toTrueOrFalse(answer.value.display);
              }
              const optionKey = questionId
                ? `${encounter.form.uuid}-${answer.concept.uuid}-${questionId}`
                : `${encounter.form.uuid}-${answer.concept.uuid}`;
          
              const matchingOptionSet = state.optionSetKey[optionKey];
          
              const opt = state.optsMap.find(
                (o) =>
                  o["value.uuid - External ID"] === answer.value.uuid &&
                  o["DHIS2 Option Set UID"] === matchingOptionSet
              );
          
              // Removed fallback logic to DHIS2 Option name and answer.value.display
              // Now only using DHIS2 Option Code to ensure proper validation
              const matchingOption = opt?.["DHIS2 Option Code"];
          
              // Capture missing DHIS2 Option Codes for tracking
              if (!matchingOption) {
                state.missingOptsets.push({
                  timestamp: new Date().toISOString(),
                  openMrsQuestion: answer.concept.display || "N/A",
                  conceptExternalId: answer.concept.uuid,
                  answerDisplay: answer.value.display,
                  answerValueUuid: answer.value.uuid,
                  dhis2DataElementUid: dataElement,
                  dhis2OptionSetUid: matchingOptionSet || "N/A",
                  metadataFormName: encounter.form.name || encounter.form.uuid,
                  encounterUuid: encounter.uuid,
                  patientUuid: encounter.patient.uuid,
                  sourceFile: state.sourceFile,
                  optionKey,
                });
              }
          
              if (["FALSE", "No"].includes(matchingOption)) return "false";
              if (["TRUE", "Yes"].includes(matchingOption)) return "true";
          
              return matchingOption;
            }
          
            if (
              isObjectAnswer &&
              conceptUuid === "722dd83a-c1cf-48ad-ac99-45ac131ccc96" &&
              dataElement === "pN4iQH4AEzk"
            ) {
              console.log("Yes done by psychologist..");
          
              return "" + answer.value.uuid === "278401ee-3d6f-4c65-9455-f1c16d0a7a98";
            }
          
            if (
              isObjectAnswer &&
              conceptUuid === "54e8c1b6-6397-4822-89a4-cf81fbc68ce9" &&
              dataElement === "G0hLyxqgcO7"
            ) {
              console.log("True only question detected..", dataElement);
              return answer.value.uuid === "681cf0bc-5213-492a-8470-0a0b3cc324dd"
                ? "true"
                : undefined;
            }
          
            const isEncounterDate =
              conceptUuid === "encounter-date" &&
              ["CXS4qAJH2qD", "I7phgLmRWQq", "yUT7HyjWurN", "EOFi7nk2vNM"].includes(
                dataElement
              );
          
            // These are data elements for encounter date in DHIS2
            // F29 MHPSS Baseline, F31-mhGAP Baseline, F30-MHPSS Follow-up, F32-mhGAp Follow-up
            if (isEncounterDate) {
              return encounter.encounterDatetime.replace("+0000", "");
            }
          
            return "";
          };
          
          const formEncounters = (formDescription, encounters) => {
            return encounters.filter((e) => e.form.description.includes(formDescription));
          };
          
          const buildExitEvent = (encounter, tei, state) => {
            const { program, orgUnit, trackedEntity, enrollment, events } = tei;
          
            let exitEvents = [];
            const sharedEventMap = {
              program,
              orgUnit,
              trackedEntity,
              enrollment,
              occurredAt: encounter.encounterDatetime.replace("+0000", ""),
            };
          
            if (encounter.form.name.includes("F49-NCDs Baseline")) {
              const eventsMap = mapF49(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F50-NCDs Follow-up")) {
              const eventsMap = mapF50(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F55-HBV Baseline")) {
              const eventsMap = mapF55(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F56-HBV Follow-up")) {
              const eventsMap = mapF56(encounter, events);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F58-HCV Follow-up")) {
              const eventsMap = mapF58(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F59-Social Work Baseline")) {
              const eventsMap = mapF59(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F60-Social Work Follow-up")) {
              const eventsMap = mapF60(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
          
            if (encounter.form.name.includes("F62-Palliative care Baseline")) {
              const eventsMap = mapF62(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
            if (encounter.form.name.includes("F63-Palliative care Follow-up")) {
              const eventsMap = mapF63(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
          
            if (encounter.form.name.includes("F68-NTDs Dengue")) {
              const eventsMap = mapF68(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
          
            if (encounter.form.name.includes("F69-NTDs Filariasis")) {
              const eventsMap = mapF69(encounter, events, state);
              for (const event of eventsMap) {
                exitEvents.push({ ...sharedEventMap, ...event });
              }
            }
          
            return exitEvents;
          };
          
          function mapF13(encounter, state) {
            if (encounter.form.name.includes("F13-PNC")) {
              const answers = encounter.obs.filter(
                (o) => o.concept.uuid === "22809b19-54ca-4d88-8d26-9577637c184e"
              );
          
              // Define mapping configurations
              const mappingConfig = [
                { dataElement: "ErtqJsZINyX", index: 0 },
                { dataElement: "wWAMdsjks50", index: 1 },
                { dataElement: "Dh1ocjojOrC", index: 2 },
                { dataElement: "KR03PHkzVw1", index: 3 },
                { dataElement: "kDA55sgLAwY", index: 4 },
              ];
          
              // Only add mappings for answers that exist
              return mappingConfig.map((config) => {
                if (answers[config.index] !== undefined) {
                  const value = state.optsMap.find(
                    (o) =>
                      o["value.uuid - External ID"] ===
                        answers[config.index]?.value?.uuid &&
                      o["DHIS2 Option Set UID"] === "lOD0K3UhiN2"
                  )?.["DHIS2 Option Code"];
          
                  if (!value) {
                    state.missingOptsets.push({
                      timestamp: new Date().toISOString(),
                      openMrsQuestion: answers[config.index]?.concept?.display || "N/A",
                      conceptExternalId: answers[config.index]?.concept?.uuid,
                      answerDisplay: answers[config.index]?.value?.display,
                      answerValueUuid: answers[config.index]?.value?.uuid,
                      dhis2DataElementUid: dataElement,
                      dhis2OptionSetUid: "N/A",
                      metadataFormName: encounter.form.name || encounter.form.uuid,
                      encounterUuid: encounter.uuid,
                      patientUuid: encounter.patient.uuid,
                      sourceFile: state.sourceFile,
                      optionKey: "N/A",
                    });
                  }
                  return {
                    dataElement: config.dataElement,
                    value,
                  };
                }
              });
            }
          }
          
          function mapF16(encounter) {
            const answers = encounter.obs.filter(
              (o) => o.concept.uuid === "877aa979-c02f-4890-8156-836d52696f09"
            );
          
            if (encounter.form.name.includes("F16-Operative Report") && answers) {
              const [date, time] = encounter.encounterDatetime.split("T");
              return [
                {
                  dataElement: "ZQgbPvQ7dWC",
                  value: date,
                },
                {
                  dataElement: "onsyxszD8X7",
                  value: formatTime(time),
                },
              ];
            }
            return;
          }
          
          function mapF17(encounter) {
            const mappings = [];
            if (
