x-openfn-core-environment: &openfn-core-environment
  OPENFN_HOSTNAME: ${OPENFN_HOSTNAME:-localhost:4000}
  MIX_ENV: ${MIX_ENV:-prod}
  NODE_ENV: ${NODE_ENV:-production}
  EMAIL_ADMIN: ${EMAIL_ADMIN:-sample@mail.com}
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-please_generate_a_more_secure_unique_secret_value_for_your_project}
  URL_SCHEME: ${URL_SCHEME:-http}
  URL_HOST: ${URL_HOST:-localhost}
  URL_PORT: ${URL_PORT:-4000}
  LISTEN_ADDRESS: ${LISTEN_ADDRESS:-0.0.0.0}
  PORT: ${PORT:-4000}
  ORIGINS: ${ORIGINS:-http://localhost:4000}
  DISABLE_DB_SSL: ${DISABLE_DB_SSL:-true}
  OPENFN_POSTGRES_HOST: ${OPENFN_POSTGRES_HOST:-openfn-postgresql}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  OPENFN_DB_NAME: ${OPENFN_DB_NAME:-lightning_prod}
  OPENFN_DB_USER: ${OPENFN_DB_USER:-hello}
  OPENFN_DB_PASSWORD: ${OPENFN_DB_PASSWORD:-password}
  DATABASE_URL: ${DATABASE_URL:-postgresql://hello:password@openfn-postgresql:5432/lightning_prod}
  DATABASE_QUEUE_INTERVAL: ${DATABASE_QUEUE_INTERVAL:-1000}
  DATABASE_QUEUE_TARGET: ${DATABASE_QUEUE_TARGET:-5000}
  DATABASE_TIMEOUT: ${DATABASE_TIMEOUT:-70000}
  PRIMARY_ENCRYPTION_KEY: ${PRIMARY_ENCRYPTION_KEY:-0bJ9w+hn4ebQrsCaWXuA9JY49fP9kbHmywGd5K7k+/s=}
  WORKER_RUNS_PRIVATE_KEY: ${WORKER_RUNS_PRIVATE_KEY:-}
  WORKER_SECRET: ${WORKER_SECRET:-dECXNlqctXJ/a+1FI4AaeLZY4Rp+Pxo23WwmJxC2xew=}
  INIT_PROJECT_FOR_NEW_USER: ${INIT_PROJECT_FOR_NEW_USER:-false}
  PURGE_DELETED_AFTER_DAYS: ${PURGE_DELETED_AFTER_DAYS:-7}
  ERL_FLAGS: ${ERL_FLAGS:-+JPperf true}
  OPENFN_COLLECTIONS_JSON_URL: ${OPENFN_COLLECTIONS_JSON_URL:-}
  OPENFN_COLLECTION_NAME: ${OPENFN_COLLECTION_NAME:-mosul-metadata-mappings-staging}
  OPENFN_ENDPOINT: ${OPENFN_ENDPOINT:-http://web:4000}
  OPENFN_COLLECTIONS_GITHUB_TOKEN: ${OPENFN_COLLECTIONS_GITHUB_TOKEN:-}
  MSF_OPENFN_FIRST_NAME: ${MSF_OPENFN_FIRST_NAME:-admin}
  MSF_OPENFN_LAST_NAME: ${MSF_OPENFN_LAST_NAME:-user}
  MSF_OPENFN_PASSWORD: ${MSF_OPENFN_PASSWORD:-Admin1234567}

x-openfn-worker-environment: &openfn-worker-environment
  WORKER_MAX_RUN_DURATION_SECONDS: ${WORKER_MAX_RUN_DURATION_SECONDS:-3600}
  WORKER_MAX_RUN_MEMORY_MB: ${WORKER_MAX_RUN_MEMORY_MB:-1000}
  WORKER_CAPACITY: ${WORKER_CAPACITY:-4}
  WORKER_SOCKET_TIMEOUT_SECONDS: ${WORKER_SOCKET_TIMEOUT_SECONDS:-70}
  WORKER_COLLECTIONS_URL: ${WORKER_COLLECTIONS_URL:-http://web:4000/collections}
  WORKER_LIGHTNING_SERVICE_URL: ${WORKER_LIGHTNING_SERVICE_URL:-http://web:4000/worker}
  MAX_DATACLIP_SIZE_MB: ${MAX_DATACLIP_SIZE_MB:-10}

networks:
  web:
    external: true

services:
  openfn-postgresql:
    command: postgres -c wal_level=logical -c max_wal_senders=10 -c max_replication_slots=10 -c max_connections=200
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OPENFN_DB_NAME: ${OPENFN_DB_NAME:-lightning_prod}
      OPENFN_DB_USER: ${OPENFN_DB_USER:-hello}
      OPENFN_DB_PASSWORD: ${OPENFN_DB_PASSWORD:-password}
    env_file:
      - '${MSF_ENV_CONFIG_PATH}/concatenated.env'
    stop_grace_period: '3s'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 5
    image: postgres:13
    networks:
      - ozone
    ports:
      - "${OPENFN_POSTGRES_PORT:-5433}:5432"
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    volumes:
      - openfn-postgres-data:/var/lib/postgresql/data
      - "${SQL_SCRIPTS_PATH}/postgresql/create_db.sh:/docker-entrypoint-initdb.d/create_db.sh"
      - "${SQL_SCRIPTS_PATH}/postgresql/create_openfn_db.sh:/docker-entrypoint-initdb.d/create_openfn_db.sh"

  migrations:
    platform: linux/x86_64/v8
    image: 'openfn/lightning:v2.14.14'
    command: ["/app/bin/lightning", "eval", "Lightning.Release.migrate"]
    env_file:
      - '${MSF_ENV_CONFIG_PATH}/concatenated.env'
    environment:
      <<: *openfn-core-environment
    depends_on:
      openfn-postgresql:
        condition: service_healthy
    networks:
      - ozone
      - web

  web:
    platform: linux/x86_64/v8
    image: 'openfn/lightning:v2.14.14'
    command: ["/app/bin/server"]
    deploy:
      resources:
        limits:
          cpus: '${DOCKER_WEB_CPUS:-0}'
          memory: '${DOCKER_WEB_MEMORY:-0}'
    env_file:
      - '${MSF_ENV_CONFIG_PATH}/concatenated.env'
    environment:
      <<: *openfn-core-environment
      ADAPTORS_REGISTRY_JSON_PATH: /app/priv/adaptor_registry_cache.json
    depends_on:
      migrations:
        condition: service_completed_successfully
      openfn-postgresql:
        condition: service_started
    labels:
      traefik.enable: "true"
      traefik.http.routers.web.rule: "Host(`${OPENFN_HOSTNAME}`)"
      traefik.http.routers.web.entrypoints: "websecure"
      traefik.http.routers.web.tls: "true"
      traefik.http.services.web.loadbalancer.server.port: "${URL_PORT:-4000}"
    healthcheck:
      test: '${DOCKER_WEB_HEALTHCHECK_TEST:-curl localhost:4000/health_check}'
      interval: '10s'
      timeout: '10s'
      start_period: '30s'
      retries: 5
    ports:
      - '${LIGHTNING_EXTERNAL_PORT:-${PORT:-4000}}:${URL_PORT:-4000}'
    networks:
      - ozone
      - web
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    volumes:
      - $OPENFN_CONFIG_PATH/adaptor_registry_cache.json:/app/priv/adaptor_registry_cache.json

  worker:
    platform: linux/x86_64/v8
    image: 'openfn/ws-worker:v1.19.6'
    deploy:
      resources:
        limits:
          cpus: '${DOCKER_WORKER_CPUS:-0}'
          memory: '${DOCKER_WEB_MEMORY:-0}'
    depends_on:
      web:
        condition: service_healthy
        restart: true
    env_file:
      - '${MSF_ENV_CONFIG_PATH}/concatenated.env'
    environment:
      <<: [*openfn-core-environment, *openfn-worker-environment]
    command: ['pnpm', 'start:prod', '-l', 'ws://web:${URL_PORT:-4000}/worker']
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    stop_grace_period: '30s'
    expose:
      - '2222'
    networks:
      - ozone
      - web

volumes:
  openfn-postgres-data:
